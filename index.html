<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, maximum-scale=1.0, user-scalable=no">
<title>TAPELINE — Record & Tag</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Oswald:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;700&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
<style>
  :root{
    --bg: #16140F;
    --panel: #211E17;
    --panel-raised: #2A2620;
    --ink: #F2EDE1;
    --ink-dim: #8A8578;
    --rule: #35312A;
    --accent: #E4572E;
    --accent-dim: #7A3122;
    --tick: #4FA893;
    --tick-dim: #2C4A44;
    --danger: #E4572E;
  }
  *{box-sizing:border-box; -webkit-tap-highlight-color: transparent;}
  html,body{margin:0; padding:0; background:var(--bg); color:var(--ink);}
  body{
    font-family: 'Oswald', system-ui, sans-serif;
    min-height:100vh;
    min-height:100dvh;
    padding-bottom: env(safe-area-inset-bottom);
    display:flex;
    justify-content:center;
  }
  .app{
    width:100%;
    max-width:520px;
    display:flex;
    flex-direction:column;
    min-height:100vh;
    min-height:100dvh;
  }

  header{
    padding: 18px 18px 10px;
    display:flex;
    align-items:baseline;
    justify-content:space-between;
    border-bottom: 1px solid var(--rule);
  }
  header h1{
    font-size: 22px;
    font-weight:700;
    letter-spacing: 0.06em;
    margin:0;
  }
  header h1 span{ color: var(--accent); }
  header .sub{
    font-family:'JetBrains Mono', monospace;
    font-size:10px;
    color: var(--ink-dim);
    letter-spacing:0.05em;
  }

  .banner{
    margin:10px 18px 0;
    padding:10px 12px;
    background: var(--panel);
    border:1px solid var(--rule);
    border-left: 3px solid var(--tick);
    border-radius:2px;
    font-family:'JetBrains Mono', monospace;
    font-size:11px;
    line-height:1.5;
    color: var(--ink-dim);
    display:none;
  }
  .banner.show{ display:block; }
  .banner.error{ border-left-color: var(--accent); color:#E8B5A6; }

  .camera-wrap{
    position:relative;
    margin:14px 18px 0;
    background:#000;
    border-radius:6px;
    overflow:hidden;
    aspect-ratio: 3/4;
    border:1px solid var(--rule);
  }
  video#preview{
    width:100%; height:100%;
    object-fit:cover;
    display:block;
    transform: scaleX(-1);
  }
  video#preview.back-cam{ transform:none; }
  .placeholder{
    position:absolute; inset:0;
    display:flex; align-items:center; justify-content:center;
    font-family:'JetBrains Mono', monospace;
    font-size:12px;
    color: var(--ink-dim);
    text-align:center;
    padding: 0 30px;
  }
  .rec-badge{
    position:absolute;
    top:12px; left:12px;
    background:rgba(0,0,0,0.55);
    backdrop-filter: blur(4px);
    padding:5px 10px;
    border-radius:20px;
    font-family:'JetBrains Mono', monospace;
    font-size:12px;
    font-weight:700;
    display:none;
    align-items:center;
    gap:6px;
    letter-spacing:0.04em;
  }
  .rec-badge.show{ display:flex; }
  .rec-dot{
    width:8px; height:8px; border-radius:50%;
    background: var(--accent);
    animation: pulse 1s infinite;
  }
  @keyframes pulse{ 0%,100%{opacity:1;} 50%{opacity:0.35;} }

  .flip-btn{
    position:absolute;
    top:12px; right:12px;
    background:rgba(0,0,0,0.55);
    backdrop-filter: blur(4px);
    border:none;
    color:var(--ink);
    width:36px; height:36px;
    border-radius:50%;
    font-size:16px;
    display:flex; align-items:center; justify-content:center;
  }
  .flip-btn:disabled{ opacity:0.3; }

  /* Timeline / tape counter — the signature element */
  .timeline-outer{
    margin:12px 18px 0;
    background: var(--panel);
    border:1px solid var(--rule);
    border-radius:6px;
    padding: 10px 0;
  }
  .timeline-label{
    font-family:'JetBrains Mono', monospace;
    font-size:9px;
    color:var(--ink-dim);
    letter-spacing:0.12em;
    padding: 0 12px 8px;
    text-transform:uppercase;
  }
  .timeline-scroll{
    overflow-x:auto;
    overflow-y:hidden;
    -webkit-overflow-scrolling: touch;
    scrollbar-width:none;
  }
  .timeline-scroll::-webkit-scrollbar{ display:none; }
  .timeline{
    position:relative;
    height:52px;
    min-width:100%;
  }
  .timeline::before{
    content:"";
    position:absolute;
    left:0; right:0; top:26px;
    height:1px;
    background: var(--rule);
  }
  .tick{
    position:absolute;
    top:20px;
    width:1px; height:12px;
    background: var(--rule);
  }
  .tick.major{ height:16px; top:16px; background: var(--ink-dim); }
  .tick-label{
    position:absolute;
    top:4px;
    font-family:'JetBrains Mono', monospace;
    font-size:9px;
    color: var(--ink-dim);
    white-space:nowrap;
    transform: translateX(-50%);
  }
  .pin{
    position:absolute;
    top:22px;
    width:2px; height:20px;
    background: var(--tick);
  }
  .pin::before{
    content:"";
    position:absolute;
    top:-6px; left:50%;
    transform:translateX(-50%);
    width:8px; height:8px;
    border-radius:50%;
    background: var(--tick);
  }
  .pin-label{
    position:absolute;
    top:38px;
    font-family:'JetBrains Mono', monospace;
    font-size:9px;
    color: var(--tick);
    white-space:nowrap;
    transform: translateX(-50%);
    max-width:80px;
    overflow:hidden;
    text-overflow:ellipsis;
  }

  .controls{
    margin:14px 18px 0;
    display:flex;
    gap:10px;
  }
  button{
    font-family:'Oswald', sans-serif;
    font-weight:600;
    letter-spacing:0.03em;
    font-size:15px;
    border:none;
    border-radius:6px;
    padding:14px 16px;
    cursor:pointer;
  }
  #startCamBtn{
    flex:1;
    background: var(--tick);
    color:#0C1613;
  }
  #recordBtn{
    flex:1;
    background: var(--accent);
    color:#1a0d08;
    display:flex;
    align-items:center;
    justify-content:center;
    gap:8px;
  }
  #recordBtn:disabled{ background: var(--panel-raised); color: var(--ink-dim); }
  #recordBtn.recording{ background:#2A2620; color:var(--accent); border:1px solid var(--accent); }

  .section-label{
    margin: 18px 18px 8px;
    font-family:'JetBrains Mono', monospace;
    font-size:10px;
    letter-spacing:0.12em;
    color: var(--ink-dim);
    text-transform:uppercase;
    display:flex;
    justify-content:space-between;
    align-items:center;
  }
  .section-label a{
    color: var(--tick);
    text-decoration:none;
    cursor:pointer;
  }

  .tag-grid{
    margin: 0 18px;
    display:grid;
    grid-template-columns: repeat(2, 1fr);
    gap:8px;
  }
  .tag-btn{
    background: var(--panel);
    border:1px solid var(--rule);
    color: var(--ink);
    padding:16px 10px;
    font-size:15px;
    border-radius:6px;
    transition: transform 0.08s ease;
  }
  .tag-btn:active{ transform: scale(0.96); background: var(--panel-raised); border-color:var(--tick); }
  .tag-btn:disabled{ opacity:0.35; }

  .log-list{
    list-style:none;
    margin:0 18px;
    padding:0;
    background:var(--panel);
    border:1px solid var(--rule);
    border-radius:6px;
    max-height:160px;
    overflow-y:auto;
  }
  .log-list li{
    display:flex;
    justify-content:space-between;
    padding:9px 12px;
    border-bottom:1px solid var(--rule);
    font-family:'JetBrains Mono', monospace;
    font-size:12px;
  }
  .log-list li:last-child{ border-bottom:none; }
  .log-list .t{ color: var(--tick); }
  .log-list .empty{ color:var(--ink-dim); justify-content:center; font-style:italic; }

  .download-section{
    margin: 18px 18px 24px;
    padding-top:14px;
    border-top:1px solid var(--rule);
  }
  video#playback{
    width:100%;
    border-radius:6px;
    border:1px solid var(--rule);
    background:#000;
    margin-bottom:12px;
  }
  .name-row{
    margin-bottom:12px;
  }
  .name-row label{
    display:block;
    font-family:'JetBrains Mono', monospace;
    font-size:10px;
    letter-spacing:0.1em;
    text-transform:uppercase;
    color: var(--ink-dim);
    margin-bottom:6px;
  }
  .name-row input{
    width:100%;
    background: var(--panel-raised);
    border:1px solid var(--rule);
    border-radius:6px;
    padding:12px;
    color:var(--ink);
    font-family:'Oswald', sans-serif;
    font-size:16px;
  }
  .name-row input:focus{ outline:none; border-color: var(--tick); }
  .zip-hint{
    font-family:'JetBrains Mono', monospace;
    font-size:11px;
    line-height:1.5;
    color: var(--ink-dim);
    margin-top:10px;
    padding:10px 12px;
    background: var(--panel);
    border:1px solid var(--rule);
    border-left: 3px solid var(--tick);
    border-radius:2px;
  }
  .dl-buttons{
    display:flex;
    flex-direction:column;
    gap:8px;
  }
  .dl-buttons button{
    background: var(--panel-raised);
    color: var(--ink);
    border:1px solid var(--rule);
    text-align:left;
    display:flex;
    justify-content:space-between;
    align-items:center;
  }
  .dl-buttons button.primary{ background: var(--tick); color:#0C1613; border:none; }
  .dl-buttons button .hint{ font-family:'JetBrains Mono', monospace; font-size:10px; opacity:0.6; font-weight:400;}
  #resetBtn{
    margin-top:14px;
    width:100%;
    background:transparent;
    border:1px solid var(--rule);
    color: var(--ink-dim);
  }

  /* modal */
  .modal-backdrop{
    position:fixed; inset:0;
    background:rgba(0,0,0,0.6);
    display:none;
    align-items:flex-end;
    justify-content:center;
    z-index:10;
  }
  .modal-backdrop.show{ display:flex; }
  .modal-card{
    background: var(--panel);
    border-top:1px solid var(--rule);
    border-radius:16px 16px 0 0;
    width:100%;
    max-width:520px;
    padding:20px 18px calc(20px + env(safe-area-inset-bottom));
  }
  .modal-card h2{
    font-size:16px;
    margin:0 0 14px;
    letter-spacing:0.04em;
  }
  .preset-row{
    display:flex;
    align-items:center;
    justify-content:space-between;
    padding:10px 0;
    border-bottom:1px solid var(--rule);
    font-size:14px;
  }
  .preset-row button{
    background:none;
    border:none;
    color: var(--accent);
    font-size:13px;
    padding:4px 8px;
  }
  .add-preset-row{
    display:flex;
    gap:8px;
    margin-top:14px;
  }
  .add-preset-row input{
    flex:1;
    background: var(--panel-raised);
    border:1px solid var(--rule);
    border-radius:6px;
    padding:12px;
    color:var(--ink);
    font-family:'Oswald', sans-serif;
    font-size:14px;
  }
  .add-preset-row button{ background: var(--tick); color:#0C1613; }
  #closeModalBtn{
    width:100%;
    margin-top:16px;
    background: var(--panel-raised);
    color: var(--ink);
    border:1px solid var(--rule);
  }
</style>
</head>
<body>
<div class="app">

  <header>
    <div>
      <h1>TAPE<span>LINE</span></h1>
      <div class="sub">RECORD // TAG // EXPORT</div>
    </div>
  </header>

  <div class="banner" id="banner"></div>

  <div class="camera-wrap">
    <video id="preview" playsinline autoplay muted></video>
    <div class="placeholder" id="placeholder">Tap "Enable Camera" below to start the preview.</div>
    <div class="rec-badge" id="recBadge"><span class="rec-dot"></span><span id="recTime">00:00</span></div>
    <button class="flip-btn" id="flipBtn" title="Flip camera">⟲</button>
  </div>

  <div class="timeline-outer">
    <div class="timeline-label">Tape counter</div>
    <div class="timeline-scroll" id="timelineScroll">
      <div class="timeline" id="timeline"></div>
    </div>
  </div>

  <div class="controls">
    <button id="startCamBtn">Enable Camera</button>
    <button id="recordBtn" disabled>● Start Recording</button>
  </div>

  <div class="section-label">
    <span>Tags</span>
    <a id="managePresetsLink">Manage tags</a>
  </div>
  <div class="tag-grid" id="tagGrid"></div>

  <div class="section-label">Tag log</div>
  <ul class="log-list" id="tagLog"><li class="empty">No tags yet</li></ul>

  <div class="download-section" id="downloadSection" style="display:none;">
    <div class="section-label" style="margin:0 0 10px;">Your recording</div>
    <video id="playback" controls playsinline></video>

    <div class="name-row">
      <label for="nameInput">Name this recording</label>
      <input id="nameInput" type="text" maxlength="60" placeholder="e.g. dog walking">
    </div>

    <div class="dl-buttons">
      <button class="primary" id="downloadZipBtn">Download folder <span class="hint">.zip — video + tags</span></button>
      <button id="downloadVideoBtn">Download video only <span class="hint" id="videoHint"></span></button>
      <button id="downloadCsvBtn">Download tags only <span class="hint">.csv</span></button>
      <button id="downloadJsonBtn">Download tags only <span class="hint">.json</span></button>
    </div>
    <div class="zip-hint" id="zipHint"></div>
    <button id="resetBtn">Start new recording</button>
  </div>

</div>

<div class="modal-backdrop" id="presetModal">
  <div class="modal-card">
    <h2>Manage tags</h2>
    <div id="presetList"></div>
    <div class="add-preset-row">
      <input id="newPresetInput" placeholder="New tag name" maxlength="24">
      <button id="addPresetBtn">Add</button>
    </div>
    <button id="closeModalBtn">Done</button>
  </div>
</div>

<script>
(function(){
  const DEFAULT_PRESETS = ['Highlight','Issue','Retry','Key Moment','Note','Setup Change'];
  const PX_PER_SEC = 20;
  const STORAGE_KEY = 'tapeline_presets_v1';

  const banner = document.getElementById('banner');
  const preview = document.getElementById('preview');
  const placeholder = document.getElementById('placeholder');
  const startCamBtn = document.getElementById('startCamBtn');
  const recordBtn = document.getElementById('recordBtn');
  const flipBtn = document.getElementById('flipBtn');
  const recBadge = document.getElementById('recBadge');
  const recTime = document.getElementById('recTime');
  const tagGrid = document.getElementById('tagGrid');
  const tagLog = document.getElementById('tagLog');
  const timeline = document.getElementById('timeline');
  const timelineScroll = document.getElementById('timelineScroll');
  const downloadSection = document.getElementById('downloadSection');
  const playback = document.getElementById('playback');
  const nameInput = document.getElementById('nameInput');
  const downloadZipBtn = document.getElementById('downloadZipBtn');
  const zipHint = document.getElementById('zipHint');
  const downloadVideoBtn = document.getElementById('downloadVideoBtn');
  const videoHint = document.getElementById('videoHint');
  const downloadCsvBtn = document.getElementById('downloadCsvBtn');
  const downloadJsonBtn = document.getElementById('downloadJsonBtn');
  const resetBtn = document.getElementById('resetBtn');
  const managePresetsLink = document.getElementById('managePresetsLink');
  const presetModal = document.getElementById('presetModal');
  const presetList = document.getElementById('presetList');
  const newPresetInput = document.getElementById('newPresetInput');
  const addPresetBtn = document.getElementById('addPresetBtn');
  const closeModalBtn = document.getElementById('closeModalBtn');

  let stream = null;
  let facingMode = 'user';
  let recorder = null;
  let chunks = [];
  let recordStartTime = null;
  let timerInterval = null;
  let lastMajorTick = -1;
  let tags = [];
  let recordedBlob = null;
  let recordedMime = '';
  let recordingStartIso = null;
  let wakeLock = null;

  async function requestWakeLock(){
    try{
      if('wakeLock' in navigator){
        wakeLock = await navigator.wakeLock.request('screen');
      }
    }catch(e){ /* not supported or denied — recording still proceeds */ }
  }
  function releaseWakeLock(){
    if(wakeLock){ wakeLock.release().catch(()=>{}); wakeLock = null; }
  }
  document.addEventListener('visibilitychange', () => {
    if(document.visibilityState === 'visible' && recorder && recorder.state === 'recording' && !wakeLock){
      requestWakeLock();
    }
  });

  function showBanner(msg, isError){
    banner.textContent = msg;
    banner.className = 'banner show' + (isError ? ' error' : '');
  }
  function hideBanner(){ banner.className = 'banner'; }

  function loadPresets(){
    try{
      const raw = localStorage.getItem(STORAGE_KEY);
      if(raw){ const arr = JSON.parse(raw); if(Array.isArray(arr) && arr.length) return arr; }
    }catch(e){}
    return DEFAULT_PRESETS.slice();
  }
  function savePresets(arr){
    try{ localStorage.setItem(STORAGE_KEY, JSON.stringify(arr)); }catch(e){}
  }
  let presets = loadPresets();

  function renderTagGrid(){
    tagGrid.innerHTML = '';
    presets.forEach(label => {
      const btn = document.createElement('button');
      btn.className = 'tag-btn';
      btn.textContent = label;
      btn.disabled = !recorder || recorder.state !== 'recording';
      btn.addEventListener('click', () => addTag(label));
      tagGrid.appendChild(btn);
    });
  }

  function renderPresetModal(){
    presetList.innerHTML = '';
    presets.forEach((label, i) => {
      const row = document.createElement('div');
      row.className = 'preset-row';
      const span = document.createElement('span');
      span.textContent = label;
      const rm = document.createElement('button');
      rm.textContent = 'Remove';
      rm.addEventListener('click', () => {
        presets.splice(i,1);
        savePresets(presets);
        renderPresetModal();
        renderTagGrid();
      });
      row.appendChild(span);
      row.appendChild(rm);
      presetList.appendChild(row);
    });
  }

  managePresetsLink.addEventListener('click', () => {
    renderPresetModal();
    presetModal.classList.add('show');
  });
  closeModalBtn.addEventListener('click', () => presetModal.classList.remove('show'));
  addPresetBtn.addEventListener('click', () => {
    const val = newPresetInput.value.trim();
    if(!val) return;
    presets.push(val);
    savePresets(presets);
    newPresetInput.value = '';
    renderPresetModal();
    renderTagGrid();
  });

  function fmtTime(totalSeconds){
    const m = Math.floor(totalSeconds/60);
    const s = Math.floor(totalSeconds%60);
    return String(m).padStart(2,'0') + ':' + String(s).padStart(2,'0');
  }

  async function startCamera(){
    hideBanner();
    try{
      if(stream){ stream.getTracks().forEach(t=>t.stop()); }
      stream = await navigator.mediaDevices.getUserMedia({
        video: {
          facingMode: facingMode,
          width: { ideal: 1280 },
          height: { ideal: 720 },
          frameRate: { ideal: 30 }
        },
        audio: true
      });
      preview.srcObject = stream;
      preview.classList.toggle('back-cam', facingMode === 'environment');
      placeholder.style.display = 'none';
      recordBtn.disabled = false;
      startCamBtn.textContent = 'Camera On';
      flipBtn.disabled = false;
    }catch(err){
      console.error(err);
      let msg = 'Could not access the camera (' + (err.message || err.name) + ').';
      if(location.protocol === 'file:'){
        msg += ' This page is open as a local file — the camera only works when this file is hosted over HTTPS.';
      }else{
        msg += ' Check that camera/microphone permission is allowed for this site in Settings.';
      }
      showBanner(msg, true);
    }
  }

  startCamBtn.addEventListener('click', startCamera);

  flipBtn.addEventListener('click', () => {
    if(recorder && recorder.state === 'recording') return;
    facingMode = facingMode === 'user' ? 'environment' : 'user';
    startCamera();
  });

  function pickMimeType(){
    const candidates = [
      'video/mp4;codecs=avc1',
      'video/mp4',
      'video/webm;codecs=vp9,opus',
      'video/webm;codecs=vp8,opus',
      'video/webm'
    ];
    for(const c of candidates){
      if(window.MediaRecorder && MediaRecorder.isTypeSupported && MediaRecorder.isTypeSupported(c)) return c;
    }
    return '';
  }

  function clearTimeline(){
    timeline.innerHTML = '';
    timeline.style.width = '100%';
    lastMajorTick = -1;
  }

  function extendRuler(elapsed){
    const neededWidth = Math.max(timelineScroll.clientWidth, elapsed * PX_PER_SEC + 60);
    timeline.style.width = neededWidth + 'px';
    const flooredSec = Math.floor(elapsed);
    while(lastMajorTick < flooredSec){
      lastMajorTick++;
      const isMajor = lastMajorTick % 5 === 0;
      const tick = document.createElement('div');
      tick.className = 'tick' + (isMajor ? ' major' : '');
      tick.style.left = (lastMajorTick * PX_PER_SEC) + 'px';
      timeline.appendChild(tick);
      if(isMajor){
        const lbl = document.createElement('div');
        lbl.className = 'tick-label';
        lbl.style.left = (lastMajorTick * PX_PER_SEC) + 'px';
        lbl.textContent = fmtTime(lastMajorTick);
        timeline.appendChild(lbl);
      }
    }
    timelineScroll.scrollLeft = timelineScroll.scrollWidth;
  }

  function addPin(elapsed, label){
    const pin = document.createElement('div');
    pin.className = 'pin';
    pin.style.left = (elapsed * PX_PER_SEC) + 'px';
    timeline.appendChild(pin);
    const lbl = document.createElement('div');
    lbl.className = 'pin-label';
    lbl.style.left = (elapsed * PX_PER_SEC) + 'px';
    lbl.textContent = label;
    timeline.appendChild(lbl);
  }

  function renderLog(){
    tagLog.innerHTML = '';
    if(tags.length === 0){
      tagLog.innerHTML = '<li class="empty">No tags yet</li>';
      return;
    }
    tags.forEach(t => {
      const li = document.createElement('li');
      const left = document.createElement('span');
      left.textContent = t.label;
      const right = document.createElement('span');
      right.className = 't';
      right.textContent = fmtTime(t.t);
      li.appendChild(left);
      li.appendChild(right);
      tagLog.appendChild(li);
    });
    tagLog.scrollTop = tagLog.scrollHeight;
  }

  function addTag(label){
    if(!recorder || recorder.state !== 'recording') return;
    const elapsed = (Date.now() - recordStartTime) / 1000;
    tags.push({ label, t: elapsed });
    addPin(elapsed, label);
    renderLog();
  }

  function updateTimer(){
    const elapsed = (Date.now() - recordStartTime) / 1000;
    recTime.textContent = fmtTime(elapsed);
    extendRuler(elapsed);
  }

  recordBtn.addEventListener('click', () => {
    if(recorder && recorder.state === 'recording'){
      stopRecording();
    }else{
      startRecording();
    }
  });

  function startRecording(){
    if(!stream) return;
    chunks = [];
    tags = [];
    clearTimeline();
    renderLog();
    const mimeType = pickMimeType();
    recordedMime = mimeType;
    try{
      recorder = mimeType ? new MediaRecorder(stream, { mimeType }) : new MediaRecorder(stream);
    }catch(e){
      showBanner('Recording failed to start: ' + e.message, true);
      return;
    }
    recorder.ondataavailable = e => { if(e.data && e.data.size > 0) chunks.push(e.data); };
    recorder.onstop = onRecordingStop;
    recorder.start(250);
    requestWakeLock();
    recordStartTime = Date.now();
    recordingStartIso = new Date(recordStartTime).toISOString();
    recBadge.classList.add('show');
    recordBtn.textContent = '■ Stop Recording';
    recordBtn.classList.add('recording');
    flipBtn.disabled = true;
    startCamBtn.disabled = true;
    renderTagGrid();
    timerInterval = setInterval(updateTimer, 200);
  }

  function stopRecording(){
    if(recorder && recorder.state !== 'inactive'){
      recorder.stop();
    }
    releaseWakeLock();
    clearInterval(timerInterval);
    recBadge.classList.remove('show');
    recordBtn.textContent = '● Start Recording';
    recordBtn.classList.remove('recording');
    flipBtn.disabled = false;
    startCamBtn.disabled = false;
    renderTagGrid();
  }

  let currentExt = 'webm';

  function sanitizeName(raw){
    const cleaned = (raw || '').trim().replace(/[\\/:*?"<>|]/g, '-');
    return cleaned || defaultName();
  }

  function defaultName(){
    const d = new Date(recordStartTime || Date.now());
    const pad = n => String(n).padStart(2,'0');
    return `recording-${d.getFullYear()}-${pad(d.getMonth()+1)}-${pad(d.getDate())}-${pad(d.getHours())}${pad(d.getMinutes())}`;
  }

  function buildCsv(){
    let csv = 'tag,elapsed_seconds,mm_ss,iso_timestamp\n';
    tags.forEach(t => {
      const iso = new Date(recordStartTime + t.t*1000).toISOString();
      csv += `"${t.label.replace(/"/g,'""')}",${t.t.toFixed(2)},${fmtTime(t.t)},${iso}\n`;
    });
    return csv;
  }

  function buildJson(){
    const data = {
      recordingStart: recordingStartIso,
      durationSeconds: (chunks.length ? (Date.now() - recordStartTime)/1000 : 0),
      tags: tags.map(t => ({
        tag: t.label,
        elapsedSeconds: Number(t.t.toFixed(2)),
        mmss: fmtTime(t.t),
        isoTimestamp: new Date(recordStartTime + t.t*1000).toISOString()
      }))
    };
    return JSON.stringify(data, null, 2);
  }

  function onRecordingStop(){
    const type = recordedMime ? recordedMime.split(';')[0] : 'video/webm';
    recordedBlob = new Blob(chunks, { type });
    const url = URL.createObjectURL(recordedBlob);
    playback.src = url;
    currentExt = type.includes('mp4') ? 'mp4' : 'webm';
    videoHint.textContent = '.' + currentExt;
    nameInput.value = defaultName();
    downloadSection.style.display = 'block';
    downloadSection.scrollIntoView({ behavior:'smooth', block:'start' });

    downloadVideoBtn.onclick = () => {
      const name = sanitizeName(nameInput.value);
      triggerFileDownload(url, `${name}.${currentExt}`);
    };

    downloadCsvBtn.onclick = () => {
      const name = sanitizeName(nameInput.value);
      downloadTextAsFile(buildCsv(), 'text/csv', `${name}-tags.csv`);
    };

    downloadJsonBtn.onclick = () => {
      const name = sanitizeName(nameInput.value);
      downloadTextAsFile(buildJson(), 'application/json', `${name}-tags.json`);
    };

    downloadZipBtn.onclick = async () => {
      const name = sanitizeName(nameInput.value);
      zipHint.textContent = 'Building zip…';
      try{
        const zip = new JSZip();
        zip.file(`${name}.${currentExt}`, recordedBlob);
        zip.file(`${name}-tags.csv`, buildCsv());
        zip.file(`${name}-tags.json`, buildJson());
        const zipBlob = await zip.generateAsync({ type: 'blob' });
        const zipUrl = URL.createObjectURL(zipBlob);
        triggerFileDownload(zipUrl, `${name}.zip`);
        zipHint.textContent = `Saved as ${name}.zip — move it into your "TagReels" folder in Files, then tap it to unzip into a "${name}" folder with the video and tags inside.`;
      }catch(e){
        zipHint.textContent = 'Zip failed: ' + e.message + ' — try the individual download buttons instead.';
      }
    };
  }

  function triggerFileDownload(url, filename){
    const a = document.createElement('a');
    a.href = url;
    a.download = filename;
    document.body.appendChild(a);
    a.click();
    a.remove();
  }

  function downloadTextAsFile(content, mime, filename){
    const blob = new Blob([content], { type: mime });
    const url = URL.createObjectURL(blob);
    triggerFileDownload(url, filename);
    setTimeout(() => URL.revokeObjectURL(url), 2000);
  }

  resetBtn.addEventListener('click', () => {
    downloadSection.style.display = 'none';
    tags = [];
    renderLog();
    clearTimeline();
    recTime.textContent = '00:00';
    playback.src = '';
    recordedBlob = null;
    nameInput.value = '';
    zipHint.textContent = '';
  });

  renderTagGrid();
  renderLog();

  if(location.protocol === 'file:'){
    showBanner('This file is open locally. Camera access needs HTTPS — host this file (e.g. GitHub Pages, Netlify Drop) and open it from there on your iPhone.', false);
  }
})();
</script>
</body>
</html>
